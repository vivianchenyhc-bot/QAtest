/* ============================================================
   沉穩學術 — Design tokens
   ============================================================ */
:root {
  --font-serif: "Spectral", "Noto Serif TC", Georgia, serif;
  --font-sans: "Noto Sans TC", system-ui, -apple-system, sans-serif;
  --font-mono: "Spline Sans Mono", "SFMono-Regular", Menlo, monospace;

  --bg: oklch(0.20 0.012 250);
  --bg-2: oklch(0.24 0.013 252);
  --panel: oklch(0.26 0.014 254);
  --panel-2: oklch(0.30 0.015 254);
  --ink: oklch(0.93 0.012 80);
  --ink-soft: oklch(0.80 0.012 82);
  --ink-mute: oklch(0.64 0.010 84);
  --line: oklch(1 0 0 / 0.10);
  --line-soft: oklch(1 0 0 / 0.06);

  --accent: oklch(0.80 0.085 82);
  --accent-soft: oklch(0.80 0.085 82 / 0.16);
  --accent-ink: oklch(0.22 0.02 80);

  --correct: oklch(0.74 0.075 152);
  --correct-soft: oklch(0.74 0.075 152 / 0.16);
  --wrong: oklch(0.64 0.13 25);
  --wrong-soft: oklch(0.64 0.13 25 / 0.16);
  --flag: oklch(0.78 0.11 60);
  --flag-soft: oklch(0.78 0.11 60 / 0.18);

  --radius: 4px;
  --radius-lg: 8px;
  --shadow: 0 1px 0 oklch(1 0 0 / 0.04) inset, 0 18px 48px -24px oklch(0 0 0 / 0.7);
  --maxw: 1180px;
}

[data-theme="paper"] {
  --bg: oklch(0.95 0.012 86);
  --bg-2: oklch(0.93 0.013 86);
  --panel: oklch(0.985 0.008 86);
  --panel-2: oklch(0.96 0.012 86);
  --ink: oklch(0.27 0.018 70);
  --ink-soft: oklch(0.42 0.016 70);
  --ink-mute: oklch(0.56 0.014 72);
  --line: oklch(0.27 0.02 70 / 0.16);
  --line-soft: oklch(0.27 0.02 70 / 0.08);
  --accent-ink: oklch(0.99 0.01 86);
  --shadow: 0 1px 0 oklch(1 0 0 / 0.6) inset, 0 16px 40px -26px oklch(0.3 0.02 70 / 0.5);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
#root { min-height: 100vh; }

h1, h2, h3, h4 { font-family: var(--font-serif); font-weight: 600; margin: 0; line-height: 1.2; letter-spacing: -0.01em; }
p { margin: 0; }
button { font-family: inherit; cursor: pointer; }
input { font-family: inherit; }
::selection { background: var(--accent-soft); }
a { color: inherit; }

* { scrollbar-width: thin; scrollbar-color: var(--line) transparent; }
*::-webkit-scrollbar { width: 9px; height: 9px; }
*::-webkit-scrollbar-thumb { background: var(--line); border-radius: 99px; }

.serif { font-family: var(--font-serif); }
.mono { font-family: var(--font-mono); }
.mute { color: var(--ink-mute); }
.soft { color: var(--ink-soft); }

.app-shell { min-height: 100vh; display: flex; flex-direction: column; }

.btn {
  appearance: none; border: 1px solid var(--line);
  background: var(--panel-2); color: var(--ink);
  padding: 11px 18px; border-radius: var(--radius);
  font-size: 14px; font-weight: 500; letter-spacing: 0.01em;
  display: inline-flex; align-items: center; gap: 8px;
  transition: background .15s, border-color .15s, transform .05s, opacity .15s;
}
.btn:hover { background: var(--panel); border-color: var(--ink-mute); }
.btn:active { transform: translateY(1px); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary {
  background: var(--accent); color: var(--accent-ink);
  border-color: transparent; font-weight: 600;
}
.btn-primary:hover { background: var(--accent); filter: brightness(1.06); border-color: transparent; }
.btn-ghost { background: transparent; border-color: transparent; }
.btn-ghost:hover { background: var(--panel-2); border-color: var(--line-soft); }
.btn-lg { padding: 14px 26px; font-size: 15px; }

.card {
  background: var(--panel); border: 1px solid var(--line-soft);
  border-radius: var(--radius-lg); box-shadow: var(--shadow);
}

.tag {
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.04em;
  text-transform: uppercase; color: var(--ink-mute);
  border: 1px solid var(--line); padding: 3px 8px; border-radius: 99px;
}

.input {
  width: 100%; background: var(--bg-2); border: 1px solid var(--line);
  color: var(--ink); padding: 13px 14px; border-radius: var(--radius);
  font-size: 15px; transition: border-color .15s, background .15s;
}
.input:focus { outline: none; border-color: var(--accent); background: var(--bg); }
.input::placeholder { color: var(--ink-mute); }

.label { font-size: 12.5px; font-weight: 600; letter-spacing: 0.03em; color: var(--ink-soft); text-transform: uppercase; }

.divider { height: 1px; background: var(--line-soft); border: 0; margin: 0; }

@keyframes riseIn { from { transform: translateY(9px); } to { transform: none; } }
.rise { animation: riseIn .4s cubic-bezier(.2,.7,.3,1); }
@media (prefers-reduced-motion: reduce) { .rise { animation: none; } }

/* 響應式 */
.show-lg-none { display: none; }
@media (max-width: 1024px) {
  .exam-grid { grid-template-columns: 1fr !important; }
  .exam-aside { display: none !important; }
  .show-lg-none { display: inline-flex; }
}
@media (max-width: 880px) {
  .auth-grid { grid-template-columns: 1fr !important; }
  .auth-aside { display: none !important; }
  .auth-brand-sm { display: block !important; }
}
@media (max-width: 760px) {
  .dash-top { grid-template-columns: 1fr !important; }
  .rec-meta { gap: 16px !important; }
}
@media (max-width: 640px) {
  .stat-row { grid-template-columns: repeat(2, 1fr) !important; row-gap: 28px !important; }
  .hide-sm { display: none !important; }
  .rec-meta { display: none !important; }
  .header-nav { display: none !important; }
  .header-inner { padding: 12px 16px !important; }
  .mobile-tab-bar { display: flex !important; }
  .app-shell { padding-bottom: 62px; }
  .wrong-book-footer { bottom: calc(56px + env(safe-area-inset-bottom, 0px)) !important; }
  /* 考試 header 手機版 */
  .exam-hd-inner { padding: 10px 14px !important; gap: 8px !important; }
  .exam-hd-progress { order: 10; flex-basis: 100% !important; margin-top: 2px; }
  .show-sm { display: flex !important; }
  .exam-submit-label::after { content: "送出考卷"; }
}
@media (min-width: 641px) {
  .exam-submit-label::after { content: "送出考卷"; }
}
.show-sm { display: none; }

/* 手機底部 Tab Bar */
.mobile-tab-bar {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
  background: var(--bg); border-top: 1px solid var(--line-soft);
  -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.mobile-tab-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 10px 4px 8px; border: 0; background: transparent;
  font-family: var(--font-sans); font-size: 10.5px; font-weight: 500;
  color: var(--ink-mute); cursor: pointer; transition: color .15s;
}
.mobile-tab-btn.is-active { color: var(--accent); }
@media (max-width: 420px) {
  .nav-grid { grid-template-columns: repeat(6, 1fr) !important; }
}

/* 題目導航格 */
.nav-cell {
  position: relative; aspect-ratio: 1; border-radius: 5px; cursor: pointer;
  font-family: var(--font-mono); font-size: 11.5px; font-weight: 500;
  border: 1px solid var(--line); background: transparent; color: var(--ink-mute);
  transition: background .12s, border-color .12s, color .12s;
}
.nav-cell:hover { border-color: var(--ink-mute); }
.nav-cell.is-ans { background: var(--panel-2); color: var(--ink); border-color: transparent; }
.nav-cell.is-flag { border-color: var(--flag); }
.nav-cell.is-cur {
  background: var(--accent); color: var(--accent-ink);
  border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft);
}
.nav-cell .flag-dot { position: absolute; top: 2px; right: 2px; width: 5px; height: 5px; border-radius: 50%; background: var(--flag); }
.nav-cell.is-cur .flag-dot { background: var(--accent-ink); }

  <script type="text/babel">
/* ============================================================
   資料層 — localStorage 模擬後端
   ============================================================ */
(function () {
  const NS = "exam_app:v1:";
  const k = (s) => NS + s;
  const read = (key, fb) => {
    try { const v = localStorage.getItem(k(key)); return v ? JSON.parse(v) : fb; }
    catch (e) { return fb; }
  };
  const write = (key, val) => { try { localStorage.setItem(k(key), JSON.stringify(val)); } catch (e) {} };

  const emailKey = (email) => (email || "").trim().toLowerCase();

  const Store = {
    getUsers() { return read("users", {}); },
    getSession() { return read("session", null); },
    setSession(email) { write("session", emailKey(email)); },
    logout() { try { localStorage.removeItem(k("session")); } catch (e) {} },

    currentUser() {
      const s = this.getSession();
      if (!s) return null;
      const u = this.getUsers()[s];
      return u || null;
    },

    registerOrLogin(email, nickname) {
      const e = emailKey(email);
      const users = this.getUsers();
      if (!users[e]) {
        users[e] = {
          email: e,
          nickname: (nickname || "").trim() || ("匿名考生-" + Math.random().toString(36).slice(2, 6).toUpperCase()),
          anonId: "U-" + Math.random().toString(36).slice(2, 8).toUpperCase(),
          createdAt: Date.now(),
        };
        write("users", users);
      } else if (nickname && nickname.trim() && nickname.trim() !== users[e].nickname) {
        users[e].nickname = nickname.trim();
        write("users", users);
      }
      this.setSession(e);
      return users[e];
    },

    drawExam(n, email) {
      const bank = (window.QUESTION_BANK || []).slice();
      for (let i = bank.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [bank[i], bank[j]] = [bank[j], bank[i]];
      }
      const count = Math.min(n, bank.length);
      if (!email) return bank.slice(0, count);

      // 限制與前兩次模擬抽考的重複率各不超過 20%
      const prevExams = this.getRecords(email)
        .filter((r) => r.mode === "exam")
        .slice(0, 2)
        .map((r) => new Set((r.items || []).map((it) => it.qid)));
      if (prevExams.length === 0) return bank.slice(0, count);

      const limit = Math.floor(count * 0.2);
      const overlapCount = prevExams.map(() => 0);
      const picked = [];
      const pickedIds = new Set();

      for (const q of bank) {
        if (picked.length >= count) break;
        const hits = prevExams.map((s) => s.has(q.id));
        const wouldExceed = hits.some((hit, i) => hit && overlapCount[i] + 1 > limit);
        if (wouldExceed) continue;
        picked.push(q);
        pickedIds.add(q.id);
        hits.forEach((hit, i) => { if (hit) overlapCount[i] += 1; });
      }
      // 若題庫過小導致無法在限制內補滿，放寬限制補齊剩餘題數
      if (picked.length < count) {
        for (const q of bank) {
          if (picked.length >= count) break;
          if (pickedIds.has(q.id)) continue;
          picked.push(q);
          pickedIds.add(q.id);
        }
      }
      return picked;
    },

    drawByIds(ids) {
      const map = {};
      (window.QUESTION_BANK || []).forEach((q) => { map[q.id] = q; });
      const list = ids.map((id) => map[id]).filter(Boolean);
      for (let i = list.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [list[i], list[j]] = [list[j], list[i]];
      }
      return list;
    },

    _recKey(email) { return "records:" + emailKey(email); },
    getRecords(email) { return read(this._recKey(email), []); },

    addRecord(email, record) {
      const items = record.items || [];
      const correct = items.filter((it) => it.picked === it.answer).length;
      const total = items.length;
      const full = {
        id: "R-" + Date.now().toString(36).toUpperCase(),
        mode: record.mode || "exam",
        startedAt: record.startedAt,
        finishedAt: record.finishedAt || Date.now(),
        durationSec: Math.max(0, Math.round(((record.finishedAt || Date.now()) - record.startedAt) / 1000)),
        correct, total,
        score: total ? Math.round((correct / total) * 100) : 0,
        flaggedCount: items.filter((it) => it.flagged).length,
        items,
      };
      const recs = this.getRecords(email);
      recs.unshift(full);
      write(this._recKey(email), recs);
      if (window.CloudStore) {
        window.CloudStore.saveRecord(email, full)
          .then(function () {
            window.dispatchEvent(new CustomEvent('__cloudSync', { detail: { ok: true, text: '紀錄已同步至雲端' } }));
          })
          .catch(function (e) {
            console.warn('[CloudStore] 儲存紀錄失敗:', e.message);
            window.dispatchEvent(new CustomEvent('__cloudSync', { detail: { ok: false, text: '雲端同步失敗：' + e.message } }));
          });
      }
      return full;
    },

    getWrongBook(email) {
      const recs = this.getRecords(email);
      const map = {};
      const bank = {};
      (window.QUESTION_BANK || []).forEach((q) => { bank[q.id] = q; });

      const ordered = recs.slice().sort((a, b) => a.finishedAt - b.finishedAt);
      ordered.forEach((r) => {
        (r.items || []).forEach((it) => {
          const base = bank[it.qid];
          if (!base) return;
          const currentAnswer = base.a;
          const isWrong = it.picked !== currentAnswer && it.picked != null;
          const isFlagged = !!it.flagged;
          if (!isWrong && !isFlagged) return;
          if (!map[it.qid]) {
            map[it.qid] = { ...base, count: 0, lastWrongAt: 0, lastPicked: null, everFlagged: false };
          }
          if (isWrong) {
            map[it.qid].count += 1;
            map[it.qid].lastWrongAt = r.finishedAt;
            map[it.qid].lastPicked = it.picked;
          }
          if (isFlagged) {
            map[it.qid].everFlagged = true;
            if (it.picked != null) map[it.qid].lastPicked = it.picked;
          }
        });
      });

      return Object.values(map).sort((a, b) =>
        b.count - a.count || b.lastWrongAt - a.lastWrongAt
      );
    },

    stats(email) {
      const recs = this.getRecords(email);
      const exams = recs.filter((r) => r.mode === "exam");
      const best = exams.reduce((m, r) => Math.max(m, r.score), 0);
      const avg = exams.length ? Math.round(exams.reduce((s, r) => s + r.score, 0) / exams.length) : 0;
      return {
        totalExams: exams.length,
        totalAttempts: recs.length,
        best, avg,
        last: recs[0] || null,
        wrongUnique: this.getWrongBook(email).length,
      };
    },

    _overwriteRecords(email, records) {
      if (Array.isArray(records) && records.length > 0) {
        write(this._recKey(email), records);
      }
    },

    _updateUser(email, data) {
      const e = emailKey(email);
      const users = this.getUsers();
      if (users[e]) { Object.assign(users[e], data); write("users", users); return users[e]; }
      return null;
    },
  };

  window.ExamStore = Store;
})();

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(clampToViewport) : null;
    if (ro) { ro.observe(document.documentElement); return () => ro.disconnect(); }
    window.addEventListener('resize', clampToViewport);
    return () => window.removeEventListener('resize', clampToViewport);
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
         style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
      <div className="twk-hd" onMouseDown={onDragStart}>
        <b>{title}</b>
        <button className="twk-x" aria-label="Close tweaks"
                onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
      </div>
      <div className="twk-body">{children}</div>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);

  if (!fitsAsSegments) {
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => {
                          const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
                          onChange(m === undefined ? s : typeof m === 'object' ? m.value : m);
                        }} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { if (!trackRef.current) return; const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakColor({ label, value, options, onChange }) {
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  const __twkIsLight = (hex) => {
    const h = String(hex).replace('#', '');
    const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
    const n = parseInt(x.slice(0, 6), 16);
    if (Number.isNaN(n)) return true;
    const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
    return r * 299 + g * 587 + b * 114 > 148000;
  };
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {rest.length > 0 && <span>{rest.slice(0, 4).map((c, j) => <i key={j} style={{ background: c, display: 'block', flex: 1, boxShadow: j > 0 ? '0 -1px 0 rgba(0,0,0,.1)' : 'none' }} />)}</span>}
              {on && (
                <svg viewBox="0 0 14 14" style={{ position: 'absolute', top: 6, left: 6, width: 13, height: 13, filter: 'drop-shadow(0 1px 1px rgba(0,0,0,.3))' }} aria-hidden="true">
                  <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" stroke={__twkIsLight(hero) ? 'rgba(0,0,0,.78)' : '#fff'} />
                </svg>
              )}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

   ============================================================ */
const LETTERS = ["A", "B", "C", "D", "E"];

function Exam({ user, exam, onSubmit, onExit }) {
  const activeKey = "exam_app:v1:active:" + user.email;
  const saved = (() => {
    try { const v = JSON.parse(localStorage.getItem(activeKey)); return v && v.examId === exam.examId ? v : null; } catch (e) { return null; }
  })();

  const [idx, setIdx] = React.useState(saved?.idx || 0);
  const [answers, setAnswers] = React.useState(saved?.answers || {});
  const [flags, setFlags] = React.useState(saved?.flags || {});
  const [navOpen, setNavOpen] = React.useState(false);
  const [confirm, setConfirm] = React.useState(false);
  const [elapsed, setElapsed] = React.useState(Math.round((Date.now() - exam.startedAt) / 1000));
  const mainRef = React.useRef(null);
  const cloudSaveTimer = React.useRef(null);

  const qs = exam.questions;
  const total = qs.length;
  const q = qs[idx];
  const answeredCount = Object.keys(answers).length;
  const flaggedList = qs.map((qq, i) => ({ ...qq, i })).filter((qq) => flags[qq.id]);

  React.useEffect(() => {
    const t = setInterval(() => setElapsed(Math.round((Date.now() - exam.startedAt) / 1000)), 1000);
    return () => clearInterval(t);
  }, [exam.startedAt]);

  React.useEffect(() => {
    const state = { examId: exam.examId, mode: exam.mode, startedAt: exam.startedAt, questions: qs, idx, answers, flags };
    try { localStorage.setItem(activeKey, JSON.stringify(state)); } catch (e) {}
    if (window.CloudStore) {
      if (cloudSaveTimer.current) clearTimeout(cloudSaveTimer.current);
      cloudSaveTimer.current = setTimeout(() => {
        const compact = { examId: state.examId, mode: state.mode, startedAt: state.startedAt, questionIds: qs.map((q) => q.id), idx, answers, flags };
        window.CloudStore.saveActiveExam(user.email, compact).catch(console.warn);
      }, 30000);
    }
  }, [idx, answers, flags]);

  const pick = (qid, optIdx) => setAnswers((a) => ({ ...a, [qid]: optIdx }));
  const toggleFlag = (qid) => setFlags((f) => { const n = { ...f }; if (n[qid]) delete n[qid]; else n[qid] = true; return n; });
  const goto = (i) => { setIdx(Math.max(0, Math.min(total - 1, i))); setNavOpen(false); if (mainRef.current) mainRef.current.scrollTop = 0; };

  React.useEffect(() => {
    const h = (e) => {
      if (confirm) return;
      if (e.key >= "1" && e.key <= String(q.opts.length)) pick(q.id, parseInt(e.key, 10) - 1);
      else if (e.key === "ArrowRight" && idx < total - 1) goto(idx + 1);
      else if (e.key === "ArrowLeft" && idx > 0) goto(idx - 1);
      else if (e.key.toLowerCase() === "f") toggleFlag(q.id);
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [idx, q, confirm, total]);

  const handleExit = () => {
    if (window.CloudStore) {
      if (cloudSaveTimer.current) clearTimeout(cloudSaveTimer.current);
      const compact = { examId: exam.examId, mode: exam.mode, startedAt: exam.startedAt, questionIds: qs.map((q) => q.id), idx, answers, flags };
      window.CloudStore.saveActiveExam(user.email, compact).catch(console.warn);
    }
    onExit();
  };

  const finalize = () => {
    if (cloudSaveTimer.current) clearTimeout(cloudSaveTimer.current);
    try { localStorage.removeItem(activeKey); } catch (e) {}
    if (window.CloudStore) window.CloudStore.deleteActiveExam(user.email).catch(console.warn);
    const items = qs.map((qq) => ({
      qid: qq.id, topic: qq.topic, answer: qq.a,
      picked: answers[qq.id] != null ? answers[qq.id] : null,
      flagged: !!flags[qq.id],
    }));
    const rec = window.ExamStore.addRecord(user.email, {
      mode: exam.mode, startedAt: exam.startedAt, finishedAt: Date.now(), items,
    });
    onSubmit(rec);
  };

  const mmss = `${String(Math.floor(elapsed / 60)).padStart(2, "0")}:${String(elapsed % 60).padStart(2, "0")}`;
  const isLast = idx === total - 1;

  return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column" }}>
      <header style={{ position: "sticky", top: 0, zIndex: 30, background: "var(--bg)", borderBottom: "1px solid var(--line-soft)" }}>
        <div className="exam-hd-inner" style={{ maxWidth: 1320, margin: "0 auto", padding: "12px 22px", display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap" }}>
          <button className="btn btn-ghost" onClick={handleExit} style={{ padding: "8px 10px", flex: "none" }} title="離開（進度已儲存至雲端）">
            <Icon name="arrowL" size={16} /> <span className="hide-sm">離開</span>
          </button>
          <span className="mono show-sm" style={{ fontSize: 12, color: "var(--ink-mute)", alignItems: "center", gap: 5, flex: "none" }}>
            <Icon name="clock" size={13} /> {mmss}
          </span>
          <div className="exam-hd-progress" style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 6 }}>
              <span className="mono" style={{ fontSize: 12, color: "var(--ink-soft)" }}>
                {exam.mode === "practice" ? "錯題重練" : "模擬抽考"} · 已作答 {answeredCount}/{total}
              </span>
              <span className="mono hide-sm" style={{ fontSize: 12, color: "var(--ink-mute)", display: "flex", alignItems: "center", gap: 5 }}>
                <Icon name="clock" size={13} /> {mmss}
              </span>
            </div>
            <div style={{ height: 4, background: "var(--line)", borderRadius: 99, overflow: "hidden" }}>
              <div style={{ height: "100%", width: `${(answeredCount / total) * 100}%`, background: "var(--accent)", borderRadius: 99, transition: "width .3s" }} />
            </div>
          </div>
          <div style={{ display: "flex", gap: 8, marginLeft: "auto", flex: "none" }}>
            <button className="btn show-lg-none" onClick={() => setNavOpen(true)} style={{ padding: "8px 10px" }}>
              <Icon name="list" size={16} />
              {flaggedList.length > 0 && <span style={{ marginLeft: 2, color: "var(--flag)", fontSize: 12 }}>·{flaggedList.length}</span>}
            </button>
            <button className="btn btn-primary" onClick={() => setConfirm(true)}>
              <span className="exam-submit-label" />
            </button>
          </div>
        </div>
      </header>

      <div style={{ flex: 1, maxWidth: 1320, width: "100%", margin: "0 auto", padding: "0 22px", display: "grid", gridTemplateColumns: "1fr 300px", gap: 28 }} className="exam-grid">
        <main ref={mainRef} style={{ padding: "36px 0 40px", minWidth: 0 }}>
          <div key={q.id} className="rise" style={{ maxWidth: 720 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 18 }}>
              <span className="mono" style={{ fontSize: 13, color: "var(--accent)", fontWeight: 500, whiteSpace: "nowrap", flex: "none" }}>
                第 {String(idx + 1).padStart(2, "0")} / {total} 題
              </span>
              <span className="tag">{q.topic}</span>
              <button onClick={() => toggleFlag(q.id)} className="btn"
                style={{
                  marginLeft: "auto", padding: "7px 13px", fontSize: 13,
                  color: flags[q.id] ? "var(--flag)" : "var(--ink-mute)",
                  borderColor: flags[q.id] ? "var(--flag)" : "var(--line)",
                  background: flags[q.id] ? "var(--flag-soft)" : "var(--panel-2)",
                }}>
                <Icon name="flag" size={15} /> {flags[q.id] ? "已標註" : "標註"}
              </button>
            </div>

            <h2 className="serif" style={{ fontSize: "clamp(19px,2.2vw,25px)", lineHeight: 1.55, marginBottom: 28 }}>
              {q.q}
            </h2>

            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {q.opts.map((opt, i) => {
                const selected = answers[q.id] === i;
                return (
                  <button key={i} onClick={() => pick(q.id, i)}
                    style={{
                      display: "flex", alignItems: "center", gap: 16, textAlign: "left",
                      padding: "16px 18px", borderRadius: 8, cursor: "pointer",
                      border: "1px solid " + (selected ? "var(--accent)" : "var(--line)"),
                      background: selected ? "var(--accent-soft)" : "var(--panel)",
                      color: "var(--ink)", transition: "border-color .14s, background .14s",
                      fontFamily: "var(--font-sans)", fontSize: 16,
                    }}
                    onMouseEnter={(e) => { if (!selected) e.currentTarget.style.borderColor = "var(--ink-mute)"; }}
                    onMouseLeave={(e) => { if (!selected) e.currentTarget.style.borderColor = "var(--line)"; }}>
                    <span style={{
                      flex: "none", width: 30, height: 30, borderRadius: 6, display: "grid", placeItems: "center",
                      fontFamily: "var(--font-mono)", fontSize: 14, fontWeight: 600,
                      border: "1px solid " + (selected ? "transparent" : "var(--line)"),
                      background: selected ? "var(--accent)" : "transparent",
                      color: selected ? "var(--accent-ink)" : "var(--ink-soft)",
                    }}>{LETTERS[i]}</span>
                    <span style={{ flex: 1, lineHeight: 1.5 }}>{opt}</span>
                  </button>
                );
              })}
            </div>

            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 36, gap: 12 }}>
              <button className="btn" onClick={() => goto(idx - 1)} disabled={idx === 0}>
                <Icon name="arrowL" size={15} /> 上一題
              </button>
              <span className="mono" style={{ fontSize: 12, color: "var(--ink-mute)" }}>
                {answers[q.id] != null ? "已選擇" : "尚未作答"}
              </span>
              {isLast ? (
                <button className="btn btn-primary" onClick={() => setConfirm(true)}>
                  送出考卷 <Icon name="check" size={15} />
                </button>
              ) : (
                <button className="btn btn-primary" onClick={() => goto(idx + 1)}>
                  下一題 <Icon name="arrowR" size={15} />
                </button>
              )}
            </div>
          </div>
        </main>

        <aside className="exam-aside" style={{ padding: "36px 0", position: "sticky", top: 70, alignSelf: "start", height: "calc(100vh - 70px)", overflowY: "auto" }}>
          <NavPanel qs={qs} idx={idx} answers={answers} flags={flags} flaggedList={flaggedList} goto={goto} />
        </aside>
      </div>

      {navOpen && (
        <div onClick={() => setNavOpen(false)} style={{ position: "fixed", inset: 0, zIndex: 50, background: "oklch(0 0 0 / 0.5)", display: "flex", justifyContent: "flex-end" }}>
          <div onClick={(e) => e.stopPropagation()} className="rise" style={{ width: "min(380px, 88vw)", background: "var(--bg)", borderLeft: "1px solid var(--line)", padding: "20px 20px 40px", overflowY: "auto" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
              <h3 className="serif" style={{ fontSize: 18 }}>題目導航</h3>
              <button className="btn btn-ghost" onClick={() => setNavOpen(false)} style={{ padding: 8 }}><Icon name="x" size={16} /></button>
            </div>
            <NavPanel qs={qs} idx={idx} answers={answers} flags={flags} flaggedList={flaggedList} goto={goto} />
          </div>
        </div>
      )}

      {confirm && (
        <div style={{ position: "fixed", inset: 0, zIndex: 60, background: "oklch(0 0 0 / 0.55)", display: "grid", placeItems: "center", padding: 20 }} onClick={() => setConfirm(false)}>
          <div className="card rise" onClick={(e) => e.stopPropagation()} style={{ maxWidth: 440, width: "100%", padding: 30 }}>
            <h3 className="serif" style={{ fontSize: 22, marginBottom: 10 }}>確定送出考卷？</h3>
            <p style={{ fontSize: 14.5, color: "var(--ink-soft)", lineHeight: 1.6, marginBottom: 20 }}>
              送出後將立即計分並記錄成績，無法再修改答案。
            </p>
            <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 24 }}>
              <SummaryRow label="已作答" value={`${answeredCount} / ${total} 題`} tone={answeredCount === total ? "var(--correct)" : "var(--flag)"} />
              <SummaryRow label="未作答" value={`${total - answeredCount} 題`} tone={total - answeredCount > 0 ? "var(--wrong)" : "var(--ink-mute)"} />
              <SummaryRow label="標註" value={`${flaggedList.length} 題`} tone="var(--flag)" />
            </div>
            {total - answeredCount > 0 && (
              <p style={{ fontSize: 13, color: "var(--wrong)", marginBottom: 18 }}>
                尚有 {total - answeredCount} 題未作答，未作答將以答錯計。
              </p>
            )}
            <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
              <button className="btn" onClick={() => setConfirm(false)}>返回作答</button>
              <button className="btn btn-primary" onClick={finalize}>確認送出</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function SummaryRow({ label, value, tone }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 14px", borderRadius: 6, background: "var(--bg-2)", border: "1px solid var(--line-soft)" }}>
      <span style={{ fontSize: 14, color: "var(--ink-soft)" }}>{label}</span>
      <span className="mono" style={{ fontSize: 14, fontWeight: 600, color: tone || "var(--ink)", whiteSpace: "nowrap" }}>{value}</span>
    </div>
  );
}

function NavPanel({ qs, idx, answers, flags, flaggedList, goto }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 22 }}>
      <div>
        <div className="label" style={{ marginBottom: 12, display: "flex", justifyContent: "space-between" }}>
          <span>題目導航</span>
          <span style={{ color: "var(--ink-mute)", fontWeight: 400 }}>{Object.keys(answers).length}/{qs.length}</span>
        </div>
        <div key={"navgrid-" + idx} style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 6 }} className="nav-grid">
          {qs.map((qq, i) => {
            const ans = answers[qq.id] != null;
            const cur = i === idx;
            const fl = flags[qq.id];
            return (
              <button key={qq.id} onClick={() => goto(i)} title={`第 ${i + 1} 題`}
                className={"nav-cell" + (cur ? " is-cur" : "") + (ans ? " is-ans" : "") + (fl ? " is-flag" : "")}>
                {i + 1}
                {fl && <span className="flag-dot" />}
              </button>
            );
          })}
        </div>
        <div style={{ display: "flex", gap: 14, marginTop: 12, flexWrap: "wrap" }}>
          <Legend color="var(--panel-2)" border="transparent" label="已作答" />
          <Legend color="transparent" border="var(--line)" label="未作答" />
          <Legend color="transparent" border="var(--flag)" dot label="不確定" />
        </div>
      </div>

      <hr className="divider" />

      <div>
        <div className="label" style={{ marginBottom: 12, display: "flex", alignItems: "center", gap: 7, color: "var(--flag)" }}>
          <Icon name="flag" size={14} /> 不確定清單 ({flaggedList.length})
        </div>
        {flaggedList.length === 0 ? (
          <p style={{ fontSize: 13, color: "var(--ink-mute)", lineHeight: 1.6 }}>
            尚未標註任何題目。作答時按「標註」或鍵盤 <span className="mono">F</span>，會列在此處方便回頭檢查。
          </p>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {flaggedList.map((qq) => (
              <button key={qq.id} onClick={() => goto(qq.i)}
                style={{
                  display: "flex", gap: 10, alignItems: "flex-start", textAlign: "left", cursor: "pointer",
                  padding: "9px 11px", borderRadius: 6, border: "1px solid var(--line-soft)", background: "var(--panel)",
                  color: "var(--ink)", width: "100%",
                }}
                onMouseEnter={(e) => e.currentTarget.style.borderColor = "var(--flag)"}
                onMouseLeave={(e) => e.currentTarget.style.borderColor = "var(--line-soft)"}>
                <span className="mono" style={{ fontSize: 12, color: "var(--flag)", fontWeight: 600, flex: "none", marginTop: 1 }}>{String(qq.i + 1).padStart(2, "0")}</span>
                <span style={{ fontSize: 12.5, color: "var(--ink-soft)", lineHeight: 1.45, overflow: "hidden", display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical" }}>{qq.q}</span>
              </button>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function Legend({ color, border, label, dot }) {
  return (
    <span style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11, color: "var(--ink-mute)" }}>
      <span style={{ position: "relative", width: 13, height: 13, borderRadius: 4, background: color, border: "1px solid " + border }}>
        {dot && <span style={{ position: "absolute", top: 1, right: 1, width: 4, height: 4, borderRadius: "50%", background: "var(--flag)" }} />}
      </span>
      {label}
    </span>
  );
}

/* ============================================================
   Result
   ============================================================ */
function Result({ record, onHome, onWrong, onRetry }) {
  const { score, correct, total, durationSec, flaggedCount } = record;
  const verdict = score >= 80 ? { t: "表現優異", c: "var(--correct)" } : score >= 60 ? { t: "及格通過", c: "var(--accent)" } : { t: "仍需加強", c: "var(--wrong)" };
  const wrongCount = total - correct;
  const mins = Math.floor(durationSec / 60), secs = durationSec % 60;

  return (
    <div style={{ maxWidth: 680, margin: "0 auto", padding: "56px 24px 80px", textAlign: "center" }} className="rise">
      <div className="mono" style={{ fontSize: 12, letterSpacing: "0.18em", color: "var(--ink-mute)", marginBottom: 28 }}>
        {record.mode === "practice" ? "錯題重練完成" : "模擬測驗完成"}
      </div>

      <div style={{ display: "grid", placeItems: "center", marginBottom: 24 }}>
        <ScoreRing value={score} size={196} stroke={12} label={score} sub="SCORE / 100" />
      </div>

      <h1 className="serif" style={{ fontSize: 30, marginBottom: 8, color: verdict.c }}>{verdict.t}</h1>
      <p style={{ fontSize: 15, color: "var(--ink-soft)", marginBottom: 36 }}>
        本場共 {total} 題，答對 {correct} 題。成績已記錄於你的個人紀錄中。
      </p>

      <div className="card" style={{ padding: "8px 0", display: "grid", gridTemplateColumns: "repeat(4,1fr)", marginBottom: 32 }}>
        {[
          { label: "答對", value: correct, tone: "var(--correct)" },
          { label: "答錯", value: wrongCount, tone: wrongCount ? "var(--wrong)" : "var(--ink)" },
          { label: "標註", value: flaggedCount, tone: "var(--flag)" },
          { label: "用時", value: `${mins}:${String(secs).padStart(2, "0")}`, tone: "var(--ink)" },
        ].map((s, i) => (
          <div key={s.label} style={{ padding: "20px 12px", borderLeft: i ? "1px solid var(--line-soft)" : "none" }}>
            <div className="serif" style={{ fontSize: 30, fontWeight: 600, color: s.tone }}>{s.value}</div>
            <div className="mono" style={{ fontSize: 11, color: "var(--ink-mute)", marginTop: 4 }}>{s.label}</div>
          </div>
        ))}
      </div>

      <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
        <button className="btn btn-lg" onClick={onHome}>回首頁</button>
        {wrongCount > 0 && <button className="btn btn-lg" onClick={onWrong}><Icon name="again" size={16} /> 檢視錯題本</button>}
        <button className="btn btn-primary btn-lg" onClick={onRetry}><Icon name="spark" size={16} /> 再考一次</button>
      </div>

      <p className="mono" style={{ fontSize: 11, color: "var(--ink-mute)", marginTop: 30, letterSpacing: "0.04em" }}>
        答錯的題目已自動累計至錯題本 · 紀錄編號 {record.id}
      </p>
    </div>
  );
}

/* ============================================================
   RecordDetail — 單場考試詳細檢視
   ============================================================ */
function RecordDetail({ record, onClose }) {
  const [tab, setTab] = React.useState("all");
  const bank = {};
  (window.QUESTION_BANK || []).forEach((q) => { bank[q.id] = q; });

  const items = (record.items || []).map((it, idx) => {
    const qFull = bank[it.qid] || null;
    const currentAnswer = qFull != null ? qFull.a : it.answer;
    return {
      ...it,
      answer: currentAnswer,
      num: idx + 1,
      qFull,
      isCorrect: it.picked === currentAnswer,
      isAnswered: it.picked != null,
    };
  });

  const shown = tab === "wrong"
    ? items.filter((it) => !it.isCorrect)
    : tab === "correct"
    ? items.filter((it) => it.isCorrect && it.isAnswered)
    : tab === "flagged"
    ? items.filter((it) => it.flagged)
    : items;

  const wrongCount = items.filter((it) => !it.isCorrect).length;
  const correctCount = items.filter((it) => it.isCorrect && it.isAnswered).length;
  const flaggedCount = items.filter((it) => it.flagged).length;

  const fmt = (t) => {
    const d = new Date(t);
    return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
  };

  return (
    <div style={{ position:"fixed", inset:0, zIndex:70, background:"oklch(0 0 0 / 0.6)", display:"flex", justifyContent:"flex-end" }} onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()} className="rise" style={{ width:"min(780px, 96vw)", background:"var(--bg)", borderLeft:"1px solid var(--line)", overflowY:"auto", display:"flex", flexDirection:"column" }}>

        <div style={{ padding:"20px 28px", borderBottom:"1px solid var(--line-soft)", display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, background:"var(--bg)", zIndex:1 }}>
          <div>
            <h2 className="serif" style={{ fontSize:22 }}>{record.mode === "practice" ? "錯題重練" : "模擬抽考"} 詳細紀錄</h2>
            <div className="mono" style={{ fontSize:12, color:"var(--ink-mute)", marginTop:4 }}>{fmt(record.finishedAt)} · {record.id}</div>
          </div>
          <button className="btn btn-ghost" onClick={onClose} style={{ padding:8 }}><Icon name="x" size={18} /></button>
        </div>

        <div style={{ padding:"16px 28px", borderBottom:"1px solid var(--line-soft)", display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:16 }}>
          {[
            { label:"分數", val: record.score, tone: record.score >= 80 ? "var(--correct)" : record.score >= 60 ? "var(--accent)" : "var(--wrong)" },
            { label:"答對", val: record.correct, tone:"var(--correct)" },
            { label:"答錯", val: record.total - record.correct, tone:"var(--wrong)" },
            { label:"用時", val: `${Math.floor(record.durationSec/60)}:${String(record.durationSec%60).padStart(2,"0")}`, tone:"var(--ink)" },
          ].map((s) => (
            <div key={s.label} style={{ textAlign:"center" }}>
              <div className="serif" style={{ fontSize:28, fontWeight:600, color:s.tone }}>{s.val}</div>
              <div className="mono" style={{ fontSize:11, color:"var(--ink-mute)", marginTop:2 }}>{s.label}</div>
            </div>
          ))}
        </div>

        <div style={{ padding:"12px 28px", borderBottom:"1px solid var(--line-soft)", display:"flex", gap:8 }}>
          {[["all",`全部 (${items.length})`],["wrong",`答錯 (${wrongCount})`],["correct",`答對 (${correctCount})`],["flagged",`已標註 (${flaggedCount})`]].map(([kk,l]) => (
            <button key={kk} onClick={() => setTab(kk)} className="btn" style={{
              padding:"7px 15px", fontSize:13,
              background: tab === kk ? "var(--accent-soft)" : "transparent",
              borderColor: tab === kk ? "var(--accent)" : "var(--line)",
              color: tab === kk ? "var(--ink)" : "var(--ink-mute)",
            }}>{l}</button>
          ))}
        </div>

        <div style={{ padding:"20px 28px", display:"flex", flexDirection:"column", gap:14 }}>
          {shown.length === 0 && (
            <div style={{ textAlign:"center", padding:"40px 0", color:"var(--ink-mute)" }}>
              <Icon name="check" size={32} /><p style={{ marginTop:12, fontSize:14 }}>這個分類沒有題目</p>
            </div>
          )}
          {shown.map((it) => {
            const q = it.qFull;
            if (!q) return (
              <div key={it.qid} className="card" style={{ padding:"12px 18px", opacity:0.5 }}>
                <span className="mono" style={{ fontSize:12 }}>{it.qid} — 題目資料不在目前題庫中</span>
              </div>
            );
            return (
              <div key={it.qid} className="card" style={{ padding:"18px 22px", borderColor: it.isCorrect ? "var(--correct-soft)" : it.isAnswered ? "var(--wrong-soft)" : "var(--line-soft)" }}>
                <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10, flexWrap:"wrap" }}>
                  <span className="mono" style={{ fontSize:11, color:"var(--ink-mute)" }}>第 {String(it.num).padStart(2,"0")} 題</span>
                  <span className="mono" style={{ fontSize:11, color:"var(--accent)", fontWeight:600 }}>{it.qid}</span>
                  <span className="tag">{q.topic}</span>
                  {it.flagged && <span className="tag" style={{ color:"var(--flag)", borderColor:"var(--flag)" }}>已標註</span>}
                  <span style={{ marginLeft:"auto", fontSize:12, fontWeight:600, display:"flex", alignItems:"center", gap:4,
                    color: it.isCorrect ? "var(--correct)" : it.isAnswered ? "var(--wrong)" : "var(--ink-mute)" }}>
                    {it.isCorrect ? <><Icon name="check" size={13} /> 答對</> : it.isAnswered ? <><Icon name="x" size={13} /> 答錯</> : "未作答"}
                  </span>
                </div>
                <p className="serif" style={{ fontSize:16, lineHeight:1.55, marginBottom:14 }}>{q.q}</p>
                <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                  {(q.opts || []).map((opt, i) => {
                    const isCorrect = i === it.answer;
                    const wasPicked = i === it.picked;
                    return (
                      <div key={i} style={{
                        display:"flex", alignItems:"center", gap:12, padding:"10px 14px", borderRadius:6,
                        border:"1px solid " + (isCorrect ? "var(--correct)" : wasPicked ? "var(--wrong)" : "var(--line-soft)"),
                        background: isCorrect ? "var(--correct-soft)" : wasPicked ? "var(--wrong-soft)" : "transparent",
                      }}>
                        <span className="mono" style={{ fontSize:12, fontWeight:600, flex:"none",
                          color: isCorrect ? "var(--correct)" : wasPicked ? "var(--wrong)" : "var(--ink-mute)" }}>{LETTERS[i]}</span>
                        <span style={{ flex:1, fontSize:14.5, color:"var(--ink-soft)", lineHeight:1.45 }}>{opt}</span>
                        {isCorrect && <span style={{ fontSize:12, color:"var(--correct)", display:"flex", alignItems:"center", gap:4, flex:"none" }}><Icon name="check" size={13} /> 正解</span>}
                        {wasPicked && !isCorrect && <span style={{ fontSize:12, color:"var(--wrong)", display:"flex", alignItems:"center", gap:4, flex:"none" }}><Icon name="x" size={12} /> 我的答案</span>}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   Records
   ============================================================ */
function Records({ user, onStartExam, onNav }) {
  const records = window.ExamStore.getRecords(user.email);
  const exams = records.filter((r) => r.mode === "exam");
  const stats = window.ExamStore.stats(user.email);
  const [filter, setFilter] = React.useState("all");
  const [detail, setDetail] = React.useState(null);
  const [pushStatus, setPushStatus] = React.useState(null);

  const forceSyncToCloud = () => {
    if (!window.CloudStore || !records.length) return;
    setPushStatus("syncing");
    Promise.all(records.map((r) => window.CloudStore.saveRecord(user.email, r)))
      .then(() => { setPushStatus("ok"); setTimeout(() => setPushStatus(null), 4000); })
      .catch((e) => { setPushStatus("err:" + e.message); });
  };

  const fmt = (t) => {
    const d = new Date(t);
    return `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, "0")}/${String(d.getDate()).padStart(2, "0")} ${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
  };
  const shown = records.filter((r) => filter === "all" || r.mode === filter);
  const trend = exams.slice(0, 12).reverse();

  return (
    <div style={{ maxWidth: "var(--maxw)", margin: "0 auto", padding: "40px 24px 80px" }} className="rise">
      <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", flexWrap: "wrap", gap: 16, marginBottom: 28 }}>
        <div>
          <h1 className="serif" style={{ fontSize: "clamp(26px,3vw,34px)" }}>考試紀錄</h1>
          <p style={{ fontSize: 14, color: "var(--ink-mute)", marginTop: 6, display: "flex", alignItems: "center", gap: 7 }}>
            <Icon name="user" size={14} /> {user.nickname} · 此紀錄僅你本人可見
          </p>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
          {window.CloudStore && (
            <button className="btn" onClick={forceSyncToCloud} disabled={pushStatus === "syncing"} title="將本機所有紀錄重新推送至 Firebase"
              style={{ fontSize: 13, padding: "9px 14px", color: pushStatus === "ok" ? "var(--correct)" : pushStatus?.startsWith("err") ? "var(--wrong)" : "var(--ink-mute)", borderColor: pushStatus === "ok" ? "var(--correct)" : pushStatus?.startsWith("err") ? "var(--wrong)" : undefined }}>
              <Icon name="history" size={14} />
              {pushStatus === "syncing" ? "同步中…" : pushStatus === "ok" ? "同步成功" : pushStatus?.startsWith("err") ? "同步失敗" : "重新同步至雲端"}
            </button>
          )}
          <button className="btn btn-primary" onClick={onStartExam}><Icon name="spark" size={15} /> 開始新的抽考</button>
        </div>
      </div>
      {pushStatus?.startsWith("err") && (
        <div style={{ marginBottom: 16, padding: "10px 16px", borderRadius: 6, background: "var(--wrong-soft)", border: "1px solid var(--wrong)", color: "var(--wrong)", fontSize: 13 }}>
          {pushStatus.slice(4)}
          <p style={{ margin: "4px 0 0", fontSize: 12, opacity: 0.8 }}>請至 Firebase Console → Firestore → Rules 確認規則是否允許寫入（test mode 30 天後會過期）。</p>
        </div>
      )}

      {records.length === 0 ? (
        <div className="card"><EmptyState icon="history" title="尚無任何考試紀錄"
          desc="完成模擬抽考後，每一場的分數、用時與作答都會記錄在此，且僅你本人能查看。"
          action={<button className="btn btn-primary" onClick={onStartExam}>開始第一場抽考</button>} /></div>
      ) : (
        <>
          <div style={{ display: "grid", gridTemplateColumns: "1.6fr 1fr", gap: 20, marginBottom: 28 }} className="dash-top">
            <div className="card" style={{ padding: "24px 28px" }}>
              <div className="label" style={{ marginBottom: 18 }}>分數趨勢（最近 {trend.length} 場模擬）</div>
              {trend.length === 0 ? (
                <p style={{ fontSize: 13, color: "var(--ink-mute)" }}>尚無模擬抽考紀錄</p>
              ) : (
                <div style={{ display: "flex", alignItems: "flex-end", gap: 8, height: 140 }}>
                  {trend.map((r, i) => (
                    <div key={r.id} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 7, height: "100%", justifyContent: "flex-end" }}>
                      <span className="mono" style={{ fontSize: 11, color: "var(--ink-soft)" }}>{r.score}</span>
                      <div style={{
                        width: "100%", maxWidth: 30, borderRadius: "3px 3px 0 0",
                        height: `${Math.max(4, r.score)}%`,
                        background: r.score >= 80 ? "var(--correct)" : r.score >= 60 ? "var(--accent)" : "var(--wrong)",
                        opacity: i === trend.length - 1 ? 1 : 0.55,
                      }} title={`${r.score} 分`} />
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div className="card" style={{ padding: "24px 28px", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 22, alignContent: "center" }}>
              <Stat icon="trophy" label="最佳" value={stats.best} />
              <Stat icon="target" label="平均" value={stats.avg} />
              <Stat icon="doc" label="總場次" value={stats.totalExams} />
              <Stat icon="again" label="錯題數" value={stats.wrongUnique} />
            </div>
          </div>

          <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
            {[["all", "全部"], ["exam", "模擬抽考"], ["practice", "錯題重練"]].map(([kk, l]) => (
              <button key={kk} onClick={() => setFilter(kk)} className="btn" style={{
                padding: "7px 15px", fontSize: 13,
                background: filter === kk ? "var(--accent-soft)" : "transparent",
                borderColor: filter === kk ? "var(--accent)" : "var(--line)",
                color: filter === kk ? "var(--ink)" : "var(--ink-mute)",
              }}>{l}</button>
            ))}
            <span style={{ marginLeft: "auto", alignSelf: "center", fontSize: 13, color: "var(--ink-mute)" }} className="mono">{shown.length} 筆</span>
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {shown.map((r) => (
              <div key={r.id} className="card" onClick={() => setDetail(r)} style={{ padding: "18px 22px", display: "flex", alignItems: "center", gap: 20, cursor: "pointer" }}
                onMouseEnter={(e) => e.currentTarget.style.borderColor = "var(--ink-mute)"}
                onMouseLeave={(e) => e.currentTarget.style.borderColor = ""}>
                <ScoreRing value={r.score} size={58} stroke={5} label={r.score} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 9, flexWrap: "wrap" }}>
                    <span className="serif" style={{ fontSize: 17 }}>{r.mode === "practice" ? "錯題重練" : "模擬抽考"}</span>
                    {r.mode === "practice" && <span className="tag">PRACTICE</span>}
                    {r.score >= 80 && <span className="tag" style={{ color: "var(--correct)", borderColor: "var(--correct)" }}>高分</span>}
                  </div>
                  <div className="mono" style={{ fontSize: 12, color: "var(--ink-mute)", marginTop: 4 }}>{fmt(r.finishedAt)} · {r.id}</div>
                </div>
                <div style={{ display: "flex", gap: 26, textAlign: "right" }} className="rec-meta">
                  <MetaCell label="答對" value={`${r.correct}/${r.total}`} />
                  <MetaCell label="用時" value={`${Math.floor(r.durationSec / 60)}:${String(r.durationSec % 60).padStart(2, "0")}`} />
                  <MetaCell label="不確定" value={r.flaggedCount} />
                </div>
              </div>
            ))}
          </div>
        </>
      )}
      {detail && <RecordDetail record={detail} onClose={() => setDetail(null)} />}
    </div>
  );
}

function MetaCell({ label, value }) {
  return (
    <div>
      <div className="mono" style={{ fontSize: 15, fontWeight: 600 }}>{value}</div>
      <div className="mono" style={{ fontSize: 10.5, color: "var(--ink-mute)", marginTop: 2 }}>{label}</div>
    </div>
  );
}

/* ============================================================
   WrongBook
   ============================================================ */
function WrongBook({ user, onPractice }) {
  const wrong = window.ExamStore.getWrongBook(user.email);
  const [open, setOpen] = React.useState({});
  const [picked, setPicked] = React.useState({});
  const [topicFilter, setTopicFilter] = React.useState("all");
  const [flagFilter, setFlagFilter] = React.useState(false);

  const topics = ["all", ...Array.from(new Set(wrong.map((w) => w.topic)))];
  const flaggedCount = wrong.filter((w) => w.everFlagged).length;
  const shown = wrong.filter((w) =>
    (topicFilter === "all" || w.topic === topicFilter) &&
    (!flagFilter || w.everFlagged)
  );
  const selectedIds = Object.keys(picked).filter((id) => picked[id]);

  const fmtAgo = (t) => {
    const days = Math.floor((Date.now() - t) / 86400000);
    if (days <= 0) return "今天";
    if (days === 1) return "昨天";
    if (days < 30) return `${days} 天前`;
    return `${Math.floor(days / 30)} 個月前`;
  };
  const toggle = (id) => setPicked((p) => ({ ...p, [id]: !p[id] }));

  return (
    <div style={{ maxWidth: 900, margin: "0 auto", padding: "40px 24px 120px" }} className="rise">
      <div style={{ marginBottom: 8 }}>
        <h1 className="serif" style={{ fontSize: "clamp(26px,3vw,34px)" }}>錯題本</h1>
        <p style={{ fontSize: 14, color: "var(--ink-mute)", marginTop: 6 }}>
          依累計答錯次數由高至低排序，越常錯的題目越優先複習。
        </p>
      </div>

      {wrong.length === 0 ? (
        <div className="card" style={{ marginTop: 20 }}>
          <EmptyState icon="trophy" title="目前沒有錯題" desc="完成模擬抽考後，答錯的題目會自動收錄於此並累計次數。保持下去！" />
        </div>
      ) : (
        <>
          <div style={{ display: "flex", alignItems: "flex-start", gap: 10, flexWrap: "wrap", margin: "22px 0 18px", flexDirection: "column" }}>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {topics.map((t) => (
                <button key={t} onClick={() => setTopicFilter(t)} className="btn"
                  style={{
                    padding: "6px 13px", fontSize: 12.5,
                    background: topicFilter === t ? "var(--accent-soft)" : "transparent",
                    borderColor: topicFilter === t ? "var(--accent)" : "var(--line)",
                    color: topicFilter === t ? "var(--ink)" : "var(--ink-mute)",
                  }}>{t === "all" ? `全部 (${wrong.length})` : t}</button>
              ))}
            </div>
            <button onClick={() => setFlagFilter((f) => !f)} className="btn"
              style={{
                padding: "6px 13px", fontSize: 12.5, display: "flex", alignItems: "center", gap: 6,
                background: flagFilter ? "var(--flag-soft)" : "transparent",
                borderColor: flagFilter ? "var(--flag)" : "var(--line)",
                color: flagFilter ? "var(--flag)" : "var(--ink-mute)",
              }}>
              <Icon name="flag" size={13} /> 標註過 ({flaggedCount})
            </button>
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {shown.map((w) => {
              const isOpen = open[w.id];
              const globalRank = wrong.indexOf(w) + 1;
              return (
                <div key={w.id} className="card" style={{ overflow: "hidden", borderColor: picked[w.id] ? "var(--accent)" : "var(--line-soft)" }}>
                  <div style={{ display: "flex", alignItems: "flex-start", gap: 16, padding: "18px 22px" }}>
                    <button onClick={() => toggle(w.id)} title="加入重練"
                      style={{
                        flex: "none", width: 22, height: 22, borderRadius: 5, marginTop: 2, cursor: "pointer",
                        display: "grid", placeItems: "center",
                        border: "1px solid " + (picked[w.id] ? "transparent" : "var(--line)"),
                        background: picked[w.id] ? "var(--accent)" : "transparent",
                        color: "var(--accent-ink)",
                      }}>
                      {picked[w.id] && <Icon name="check" size={13} stroke={2.4} />}
                    </button>

                    <div style={{ flex: "none", textAlign: "center", minWidth: 52 }}>
                      {w.count > 0 ? (
                        <>
                          <div className="serif" style={{ fontSize: 26, fontWeight: 600, color: "var(--wrong)", lineHeight: 1 }}>{w.count}</div>
                          <div className="mono" style={{ fontSize: 10, color: "var(--ink-mute)", marginTop: 3 }}>次答錯</div>
                          {w.everFlagged && (
                            <div style={{ display: "flex", justifyContent: "center", marginTop: 5, color: "var(--flag)" }}>
                              <Icon name="flag" size={13} />
                            </div>
                          )}
                        </>
                      ) : (
                        <>
                          <div style={{ display: "grid", placeItems: "center", color: "var(--flag)" }}><Icon name="flag" size={26} /></div>
                          <div className="mono" style={{ fontSize: 10, color: "var(--ink-mute)", marginTop: 3 }}>已標註</div>
                        </>
                      )}
                    </div>

                    <div style={{ width: 1, alignSelf: "stretch", background: "var(--line-soft)" }} />

                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 9, marginBottom: 8, flexWrap: "wrap" }}>
                        <span className="mono" style={{ fontSize: 11, color: "var(--ink-mute)" }}>#{globalRank}</span>
                        <span className="mono" style={{ fontSize: 11, color: "var(--accent)", fontWeight: 600 }}>{w.id}</span>
                        <span className="tag">{w.topic}</span>
                        {w.count > 0
                          ? <span className="mono" style={{ fontSize: 11, color: "var(--ink-mute)" }}>最近答錯 · {fmtAgo(w.lastWrongAt)}</span>
                          : <span className="mono" style={{ fontSize: 11, color: "var(--flag)" }}>標註過，未曾答錯</span>
                        }
                      </div>
                      <p className="serif" style={{ fontSize: 17, lineHeight: 1.5 }}>{w.q}</p>

                      {!isOpen ? (
                        <button className="btn btn-ghost" onClick={() => setOpen((o) => ({ ...o, [w.id]: true }))}
                          style={{ marginTop: 10, padding: "5px 0", fontSize: 13, color: "var(--accent)" }}>
                          顯示正解與我的作答 <Icon name="arrowR" size={13} />
                        </button>
                      ) : (
                        <div style={{ marginTop: 14, display: "flex", flexDirection: "column", gap: 8 }}>
                          {w.opts.map((opt, i) => {
                            const isCorrect = i === w.a;
                            const wasPicked = i === w.lastPicked;
                            return (
                              <div key={i} style={{
                                display: "flex", alignItems: "center", gap: 12, padding: "10px 13px", borderRadius: 6,
                                border: "1px solid " + (isCorrect ? "var(--correct)" : wasPicked ? "var(--wrong)" : "var(--line-soft)"),
                                background: isCorrect ? "var(--correct-soft)" : wasPicked ? "var(--wrong-soft)" : "transparent",
                              }}>
                                <span className="mono" style={{ fontSize: 12, fontWeight: 600, color: isCorrect ? "var(--correct)" : wasPicked ? "var(--wrong)" : "var(--ink-mute)", flex: "none" }}>{["A","B","C","D","E"][i]}</span>
                                <span style={{ flex: 1, fontSize: 14.5, color: "var(--ink-soft)" }}>{opt}</span>
                                {isCorrect && <span style={{ fontSize: 12, color: "var(--correct)", display: "flex", alignItems: "center", gap: 4 }}><Icon name="check" size={13} /> 正解</span>}
                                {wasPicked && !isCorrect && <span style={{ fontSize: 12, color: "var(--wrong)", display: "flex", alignItems: "center", gap: 4 }}><Icon name="x" size={12} /> 我曾選</span>}
                              </div>
                            );
                          })}
                          <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
                            <button className="btn" style={{ padding: "6px 13px", fontSize: 13 }} onClick={() => onPractice([w.id])}>
                              <Icon name="again" size={14} /> 單題重練
                            </button>
                            <button className="btn btn-ghost" style={{ padding: "6px 13px", fontSize: 13, color: "var(--ink-mute)" }} onClick={() => setOpen((o) => ({ ...o, [w.id]: false }))}>
                              收合
                            </button>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}

      {wrong.length > 0 && (
        <div className="wrong-book-footer" style={{
          position: "fixed", left: 0, right: 0, bottom: 0, zIndex: 25,
          background: "var(--bg)", borderTop: "1px solid var(--line)",
          padding: "14px 24px",
        }}>
          <div style={{ maxWidth: 900, margin: "0 auto", display: "flex", alignItems: "center", gap: 14, justifyContent: "space-between", flexWrap: "wrap" }}>
            <span style={{ fontSize: 13.5, color: "var(--ink-soft)" }}>
              {selectedIds.length > 0 ? <>已選取 <b className="serif" style={{ fontSize: 16 }}>{selectedIds.length}</b> 題</> : <>共 {wrong.length} 道錯題待克服</>}
            </span>
            <div style={{ display: "flex", gap: 10 }}>
              {selectedIds.length > 0 ? (
                <>
                  <button className="btn" onClick={() => setPicked({})}>清除選取</button>
                  <button className="btn btn-primary" onClick={() => onPractice(selectedIds)}>
                    <Icon name="again" size={15} /> 重練選取 {selectedIds.length} 題
                  </button>
                </>
              ) : (
                <>
                  {wrong.length > 20 && <button className="btn" onClick={() => onPractice(wrong.slice(0, 20).map((w) => w.id))}>重練最常錯前 20 題</button>}
                  <button className="btn btn-primary" onClick={() => onPractice(wrong.map((w) => w.id))}>
                    <Icon name="again" size={15} /> 全部重練 ({wrong.length})
                  </button>
                </>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   App — 路由 + Tweaks
   ============================================================ */
const TWEAK_DEFAULTS = {
  theme: "paper",
  accent: ["oklch(0.80 0.085 82)", "oklch(0.22 0.02 80)"],
  headingFont: "Spectral",
  fontScale: 100,
};

const ACCENTS = [
  ["oklch(0.80 0.085 82)", "oklch(0.22 0.02 80)"],
  ["oklch(0.56 0.13 22)", "oklch(0.97 0.01 22)"],
  ["oklch(0.70 0.07 152)", "oklch(0.18 0.02 152)"],
  ["oklch(0.62 0.11 264)", "oklch(0.98 0.01 264)"],
];

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [user, setUser] = React.useState(() => window.ExamStore.currentUser());
  const [route, setRoute] = React.useState(user ? "dashboard" : "auth");
  const [exam, setExam] = React.useState(null);
  const [lastRecord, setLastRecord] = React.useState(null);
  const [syncing, setSyncing] = React.useState(false);
  const [savedExam, setSavedExam] = React.useState(null);
  const [cloudNotif, setCloudNotif] = React.useState(null);
  const notifTimerRef = React.useRef(null);

  React.useEffect(() => {
    const handler = (e) => {
      if (notifTimerRef.current) clearTimeout(notifTimerRef.current);
      setCloudNotif(e.detail);
      notifTimerRef.current = setTimeout(() => setCloudNotif(null), 5000);
    };
    window.addEventListener('__cloudSync', handler);
    return () => window.removeEventListener('__cloudSync', handler);
  }, []);

  React.useEffect(() => {
    const r = document.documentElement;
    r.setAttribute("data-theme", t.theme === "paper" ? "paper" : "dark");
    const acc = Array.isArray(t.accent) ? t.accent : ACCENTS[0];
    r.style.setProperty("--accent", acc[0]);
    r.style.setProperty("--accent-ink", acc[1]);
    r.style.setProperty("--accent-soft", `color-mix(in oklch, ${acc[0]} 16%, transparent)`);
    r.style.setProperty("--font-serif", `"${t.headingFont}", "Noto Serif TC", Georgia, serif`);
    document.body.style.fontSize = (16 * (t.fontScale || 100) / 100) + "px";
  }, [t.theme, t.accent, t.headingFont, t.fontScale]);

  const nav = (r) => { setRoute(r); window.scrollTo(0, 0); };

  React.useEffect(() => {
    if (!user) return;
    try {
      const v = localStorage.getItem("exam_app:v1:active:" + user.email);
      setSavedExam(v ? JSON.parse(v) : null);
    } catch(e) { setSavedExam(null); }
  }, [user, route]);

  const resumeExam = () => {
    if (!savedExam) return;
    setExam({ examId: savedExam.examId, mode: savedExam.mode, startedAt: savedExam.startedAt, questions: savedExam.questions });
    nav("exam");
  };

  const discardSavedExam = () => {
    if (!user) return;
    try { localStorage.removeItem("exam_app:v1:active:" + user.email); } catch(e) {}
    if (window.CloudStore) window.CloudStore.deleteActiveExam(user.email).catch(console.warn);
    setSavedExam(null);
  };

  const startExam = () => {
    setExam({ examId: "E-" + Date.now(), mode: "exam", startedAt: Date.now(), questions: window.ExamStore.drawExam(100, user.email) });
    nav("exam");
  };
  const startPractice = (ids) => {
    const qs = window.ExamStore.drawByIds(ids);
    if (!qs.length) return;
    setExam({ examId: "P-" + Date.now(), mode: "practice", startedAt: Date.now(), questions: qs });
    nav("exam");
  };
  const onSubmit = (rec) => { setLastRecord(rec); setExam(null); nav("result"); };
  const logout = () => { window.ExamStore.logout(); setUser(null); setExam(null); nav("auth"); };

  const handleAuthed = (u) => {
    if (!window.CloudStore) { setUser(u); nav("dashboard"); return; }
    setSyncing(true);
    const localRecs = window.ExamStore.getRecords(u.email);
    Promise.all([
      window.CloudStore.getUser(u.email),
      window.CloudStore.getRecords(u.email),
      window.CloudStore.getActiveExam(u.email),
    ])
    .then((results) => {
      const cloudUser   = results[0];
      const cloudRecs   = results[1];
      const cloudActive = results[2];

      // DB 已有匿名暱稱 → 沿用，不被空白輸入覆蓋
      let finalUser = u;
      if (cloudUser && cloudUser.nickname) {
        finalUser = { ...u, nickname: cloudUser.nickname, anonId: cloudUser.anonId || u.anonId };
        window.ExamStore._updateUser(finalUser.email, { nickname: finalUser.nickname, anonId: finalUser.anonId });
      }

      const syncs = [window.CloudStore.saveUser(finalUser)];
      if (cloudRecs.length === 0 && localRecs.length > 0) {
        localRecs.forEach((r) => syncs.push(window.CloudStore.saveRecord(finalUser.email, r)));
      } else {
        window.ExamStore._overwriteRecords(finalUser.email, cloudRecs);
      }
      if (cloudActive) {
        const bankMap = {};
        (window.QUESTION_BANK || []).forEach((q) => { bankMap[q.id] = q; });
        const questions = (cloudActive.questionIds || []).map((id) => bankMap[id]).filter(Boolean);
        if (questions.length > 0) {
          const fullState = { examId: cloudActive.examId, mode: cloudActive.mode, startedAt: cloudActive.startedAt, questions, idx: cloudActive.idx || 0, answers: cloudActive.answers || {}, flags: cloudActive.flags || {} };
          try { localStorage.setItem("exam_app:v1:active:" + finalUser.email, JSON.stringify(fullState)); } catch(e) {}
        }
      }
      return Promise.all(syncs).then(() => finalUser);
    })
    .then((finalUser) => { setSyncing(false); setUser(finalUser); nav("dashboard"); })
    .catch((err) => {
      console.warn('[CloudStore] 同步失敗，使用本機資料:', err.message);
      setSyncing(false);
      setUser(u);
      nav("dashboard");
    });
  };

  const Panel = (
    <TweaksPanel title="風格 Tweaks">
      <TweakSection label="主題" />
      <TweakRadio label="明暗" value={t.theme} options={["dark", "paper"]}
        onChange={(v) => setTweak("theme", v)} />
      <TweakColor label="強調色" value={Array.isArray(t.accent) ? t.accent : ACCENTS[0]}
        options={ACCENTS} onChange={(v) => setTweak("accent", v)} />
      <TweakSection label="字體" />
      <TweakSelect label="標題襯線字" value={t.headingFont}
        options={["Spectral", "Newsreader", "Source Serif 4", "Noto Serif TC"]}
        onChange={(v) => setTweak("headingFont", v)} />
      <TweakSlider label="文字大小" value={t.fontScale} min={90} max={115} step={5} unit="%"
        onChange={(v) => setTweak("fontScale", v)} />
    </TweaksPanel>
  );

  const CloudToast = cloudNotif ? (
    <div style={{
      position: 'fixed', bottom: 80, right: 20, zIndex: 200,
      background: cloudNotif.ok ? 'var(--correct-soft)' : 'var(--wrong-soft)',
      border: '1px solid ' + (cloudNotif.ok ? 'var(--correct)' : 'var(--wrong)'),
      color: cloudNotif.ok ? 'var(--correct)' : 'var(--wrong)',
      padding: '10px 16px', borderRadius: 8, fontSize: 13,
      display: 'flex', alignItems: 'center', gap: 8, maxWidth: 400,
      boxShadow: 'var(--shadow)',
    }}>
      <Icon name={cloudNotif.ok ? 'check' : 'x'} size={14} stroke={2} />
      {cloudNotif.text}
    </div>
  ) : null;

  if (route === "auth") {
    return <>{<AuthScreen onAuthed={handleAuthed} syncing={syncing} />}{Panel}</>;
  }
  if (route === "exam" && exam && user) {
    return <>{<Exam user={user} exam={exam} onSubmit={onSubmit} onExit={() => { setExam(null); nav("dashboard"); }} />}{Panel}{CloudToast}</>;
  }
  if (route === "result" && lastRecord) {
    return (
      <>
        <div className="app-shell">
          <Result record={lastRecord}
            onHome={() => nav("dashboard")}
            onWrong={() => nav("wrong")}
            onRetry={() => startExam()} />
        </div>
        {Panel}{CloudToast}
      </>
    );
  }

  return (
    <div className="app-shell">
      <PageHeader user={user} active={route} onNav={nav} onLogout={logout} />
      {route === "dashboard" && <Dashboard user={user} onStartExam={startExam} onPractice={startPractice} onNav={nav} savedExam={savedExam} onResume={resumeExam} onDiscardSaved={discardSavedExam} />}
      {route === "records" && <Records user={user} onStartExam={startExam} onNav={nav} />}
      {route === "wrong" && <WrongBook user={user} onPractice={startPractice} />}
      {Panel}{CloudToast}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
